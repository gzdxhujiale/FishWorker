<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>习惯 - 高级打卡助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F8FAFC;
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
        /* 斜线条纹背景（未打卡占位符） */
        .striped-placeholder {
            background: repeating-linear-gradient(
                45deg,
                #F1F5F9,
                #F1F5F9 4px,
                #E2E8F0 4px,
                #E2E8F0 8px
            );
        }
    </style>
</head>
<body class="overflow-hidden h-screen w-screen text-slate-800">

    <!-- React & Babel for production-like component state and seamless rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- App Root Element -->
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Native Synthesizer Sound for delightful feedback
        const playSuccessSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                // First note of the chime
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                gain1.gain.setValueAtTime(0.1, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.3);

                // Second note (harmonic harmony slightly delayed)
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime); // E5
                    gain2.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.4);
                }, 80);
            } catch (e) {
                console.log("AudioContext blocked or unsupported", e);
            }
        };

        /* Confetti Effect Component for micro-interactions */
        const ConfettiCanvas = ({ active, x, y, onComplete }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!active) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let particles = [];
                const colors = ['#34D399', '#60A5FA', '#FBBF24', '#F87171', '#C084FC'];

                for (let i = 0; i < 40; i++) {
                    particles.push({
                        x: x || window.innerWidth / 2,
                        y: y || window.innerHeight / 2,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.6) * 10 - 2,
                        radius: Math.random() * 4 + 3,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1,
                        decay: Math.random() * 0.02 + 0.015
                    });
                }

                let animationFrameId;
                const update = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let alive = false;
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.2; // gravity
                        p.alpha -= p.decay;
                        if (p.alpha > 0) {
                            alive = true;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                            ctx.fillStyle = p.color;
                            ctx.globalAlpha = p.alpha;
                            ctx.fill();
                        }
                    });

                    if (alive) {
                        animationFrameId = requestAnimationFrame(update);
                    } else {
                        onComplete();
                    }
                };

                update();
                return () => cancelAnimationFrame(animationFrameId);
            }, [active, x, y]);

            if (!active) return null;
            return <canvas ref={canvasRef} class="pointer-events-none fixed inset-0 z-50 w-full h-full" />;
        };

        // Seed some habit data matching the dates around July 2026 (matching screenshots)
        const INITIAL_HABITS = [
            {
                id: 'habit-1',
                name: '习惯一',
                emoji: '😊',
                color: '#10B981', // Emerald
                group: '上午',
                frequency: '每天',
                target: '当天完成打卡',
                startDate: '2026-07-01',
                duration: '永远',
                reminderTime: '09:00',
                autoLog: false,
                logs: {
                    '2026-07-01': '第1天打卡，感觉不错！',
                    '2026-07-02': '坚持住！',
                    '2026-07-05': '补卡记录',
                    '2026-07-06': '开始建立惯性',
                    '2026-07-13': '下午补卡。',
                    '2026-07-14': '加油！'
                }
            },
            {
                id: 'habit-2',
                name: '每日饮水 2000ml',
                emoji: '💧',
                color: '#3B82F6', // Blue
                group: '上午',
                frequency: '每天',
                target: '当天完成打卡',
                startDate: '2026-07-10',
                duration: '永远',
                reminderTime: '10:00',
                autoLog: true,
                logs: {
                    '2026-07-10': '水喝够了，身体更轻松',
                    '2026-07-11': '打卡',
                    '2026-07-15': '早起第一杯水已喝。'
                }
            },
            {
                id: 'habit-3',
                name: '阅读半小时',
                emoji: '📚',
                color: '#8B5CF6', // Violet
                group: '下午',
                frequency: '每天',
                target: '当天完成打卡',
                startDate: '2026-07-01',
                duration: '永远',
                reminderTime: '21:00',
                autoLog: false,
                logs: {
                    '2026-07-05': '看完了《设计心理学》第一章',
                    '2026-07-12': '阅读中收获平静',
                    '2026-07-14': '睡前静读半小时'
                }
            }
        ];

        function App() {
            // App state
            const [habits, setHabits] = useState(INITIAL_HABITS);
            const [selectedHabitId, setSelectedHabitId] = useState('habit-1');
            const [isDetailOpen, setIsDetailOpen] = useState(true);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editingHabit, setEditingHabit] = useState(null); // Null means creating new
            const [isGroupOpen, setIsGroupOpen] = useState({ '上午': true, '下午': true, '晚上': true });
            
            // Dropdowns
            const [isHabitDropdownOpen, setIsHabitDropdownOpen] = useState(false);
            const [isMoreMenuOpen, setIsMoreMenuOpen] = useState(false);

            // Audio & Confetti micro-interactions
            const [confetti, setConfetti] = useState({ active: false, x: 0, y: 0 });

            // Focus Timer state (Pomodoro)
            const [focusHabit, setFocusHabit] = useState(null);
            const [focusTime, setFocusTime] = useState(1500); // 25 mins
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            // Currently focused calendar anchor date (around Wed July 15, 2026 as shown in screenshot)
            const [currentAnchorDate, setCurrentAnchorDate] = useState(new Date('2026-07-15'));
            const todayStr = '2026-07-15'; // Locked to 2026-07-15 for the demo consistency

            /* --- Generate 7-day Weekly Header Array based on currentAnchorDate --- */
            const weekDays = useMemo(() => {
                const days = [];
                const dayLabels = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                for (let i = -6; i <= 0; i++) {
                    const d = new Date(currentAnchorDate);
                    d.setDate(currentAnchorDate.getDate() + i);
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const dateVal = String(d.getDate()).padStart(2, '0');
                    const dateStr = `${year}-${month}-${dateVal}`;
                    days.push({
                        name: dayLabels[d.getDay()],
                        num: d.getDate(),
                        dateStr: dateStr,
                        isToday: dateStr === todayStr
                    });
                }
                return days;
            }, [currentAnchorDate]);

            // Retrieve active habit object
            const activeHabit = useMemo(() => {
                return habits.find(h => h.id === selectedHabitId) || habits[0];
            }, [habits, selectedHabitId]);

            /* --- Streak Calculations --- */
            const calculateStats = (habit) => {
                if (!habit) return { monthCount: 0, totalCount: 0, completionRate: 0, currentStreak: 0 };
                const loggedDates = Object.keys(habit.logs || {}).sort();
                const totalCount = loggedDates.length;

                // July 2026 Specific
                const julyLogs = loggedDates.filter(d => d.startsWith('2026-07'));
                const monthCount = julyLogs.length;
                const completionRate = Math.round((monthCount / 31) * 100);

                // Streak calculation
                let currentStreak = 0;
                let checkDate = new Date(todayStr);
                
                while (true) {
                    const year = checkDate.getFullYear();
                    const month = String(checkDate.getMonth() + 1).padStart(2, '0');
                    const dateVal = String(checkDate.getDate()).padStart(2, '0');
                    const checkStr = `${year}-${month}-${dateVal}`;

                    if (habit.logs && habit.logs[checkStr] !== undefined) {
                        currentStreak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        // If checking today and unchecked, try yesterday to see if streak is still alive
                        if (checkStr === todayStr) {
                            checkDate.setDate(checkDate.getDate() - 1);
                            const yesterdayYear = checkDate.getFullYear();
                            const yesterdayMonth = String(checkDate.getMonth() + 1).padStart(2, '0');
                            const yesterdayDateVal = String(checkDate.getDate()).padStart(2, '0');
                            const yesterdayStr = `${yesterdayYear}-${yesterdayMonth}-${yesterdayDateVal}`;
                            if (habit.logs && habit.logs[yesterdayStr] !== undefined) {
                                // Streak continues from yesterday
                                continue;
                            }
                        }
                        break;
                    }
                }

                return { monthCount, totalCount, completionRate, currentStreak };
            };

            const activeStats = useMemo(() => {
                return calculateStats(activeHabit);
            }, [activeHabit]);

            /* --- Actions & Interactions --- */
            const handleToggleCheckIn = (habitId, dateStr, event) => {
                if (event) {
                    event.stopPropagation();
                    const rect = event.target.getBoundingClientRect();
                    if (!habits.find(h => h.id === habitId).logs[dateStr]) {
                        setConfetti({ active: true, x: rect.left + rect.width/2, y: rect.top + rect.height/2 });
                        playSuccessSound();
                    }
                }

                setHabits(prev => prev.map(h => {
                    if (h.id === habitId) {
                        const newLogs = { ...h.logs };
                        if (newLogs[dateStr] !== undefined) {
                            delete newLogs[dateStr];
                        } else {
                            newLogs[dateStr] = "日常完成打卡";
                        }
                        return { ...h, logs: newLogs };
                    }
                    return h;
                }));
            };

            const handleSaveHabit = (updatedHabit) => {
                if (editingHabit) {
                    // Update existing
                    setHabits(prev => prev.map(h => h.id === updatedHabit.id ? updatedHabit : h));
                } else {
                    // Create new
                    const newId = `habit-${Date.now()}`;
                    setHabits(prev => [...prev, { ...updatedHabit, id: newId }]);
                    setSelectedHabitId(newId);
                }
                setIsEditModalOpen(false);
                setEditingHabit(null);
            };

            const handleDeleteHabit = (habitId) => {
                if(confirm("确定要删除这个习惯吗？该操作不可撤销。")) {
                    setHabits(prev => prev.filter(h => h.id !== habitId));
                    setSelectedHabitId(prev => habits[0]?.id || '');
                    setIsMoreMenuOpen(false);
                }
            };

            // Focus Timer logic
            useEffect(() => {
                let interval;
                if (isTimerRunning && focusTime > 0) {
                    interval = setInterval(() => {
                        setFocusTime(prev => prev - 1);
                    }, 1000);
                } else if (focusTime === 0) {
                    setIsTimerRunning(false);
                    playSuccessSound();
                    alert(`恭喜！你已完成了有关 "${focusHabit?.name}" 的 25分钟 专注！`);
                    // Automatically log check-in for today!
                    if (focusHabit) {
                        handleToggleCheckIn(focusHabit.id, todayStr);
                    }
                    setFocusHabit(null);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, focusTime, focusHabit]);

            // Custom Notification Toast/alert replacement
            const startFocus = (habit) => {
                setFocusHabit(habit);
                setFocusTime(1500); // Reset to 25 mins
                setIsTimerRunning(true);
                setIsMoreMenuOpen(false);
            };

            // Format timer time (mm:ss)
            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div class="h-full w-full flex flex-col bg-[#FAF9FB]">
                    <ConfettiCanvas 
                        active={confetti.active} 
                        x={confetti.x} 
                        y={confetti.y} 
                        onComplete={() => setConfetti({ active: false, x: 0, y: 0 })} 
                    />

                    {}
                    {/* Top navigation mirroring image_22b846.png */}
                    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-100 z-10 shadow-sm">
                        <div class="relative flex items-center gap-2">
                            <button 
                                onClick={() => setIsHabitDropdownOpen(!isHabitDropdownOpen)}
                                class="text-2xl font-bold tracking-tight text-slate-900 flex items-center gap-2 hover:bg-slate-50 px-3 py-1.5 rounded-xl transition duration-200"
                            >
                                习惯
                                <svg class={`w-5 h-5 text-slate-500 transition-transform duration-300 ${isHabitDropdownOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                            </button>

                            {/* Dropdown Menu for App Actions */}
                            {isHabitDropdownOpen && (
                                <div class="absolute left-0 top-full mt-2 w-56 bg-white rounded-2xl shadow-xl border border-slate-100 py-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                                    <div class="px-4 py-2 text-xs font-semibold text-slate-400 tracking-wider">切换分组</div>
                                    <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50 flex items-center gap-2 text-indigo-600 font-medium">
                                        <span class="w-2 h-2 rounded-full bg-indigo-600"></span> 全部习惯
                                    </button>
                                    <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50 flex items-center gap-2 text-slate-600">
                                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> 上午习惯
                                    </button>
                                    <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50 flex items-center gap-2 text-slate-600">
                                        <span class="w-2 h-2 rounded-full bg-violet-500"></span> 下午习惯
                                    </button>
                                    <hr class="my-1 border-slate-100" />
                                    <button 
                                        onClick={() => { setIsEditModalOpen(true); setEditingHabit(null); setIsHabitDropdownOpen(false); }}
                                        class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50 text-emerald-600 font-medium flex items-center gap-2"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        新建习惯
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Top Right Action Button */}
                        <div class="flex items-center gap-3">
                            <button 
                                onClick={() => { setEditingHabit(null); setIsEditModalOpen(true); }}
                                class="p-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-xl transition duration-250 flex items-center justify-center active:scale-95 shadow-sm"
                                title="新建习惯"
                            >
                                <svg class="w-5 h-5 stroke-[2.5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                                </svg>
                            </button>
                        </div>
                    </header>

                    {/* Main Container */}
                    <div class="flex-1 flex overflow-hidden">
                        
                        {/* Left Main View (Habit List & Calendar Navigation) */}
                        <main class="flex-1 flex flex-col overflow-y-auto min-w-0 bg-white">
                            
                            {}
                            {/* Interactive weekly list mirroring image_22b846.png */}
                            <div class="px-6 py-5 bg-white border-b border-slate-100 flex justify-between items-center select-none">
                                <div class="max-w-4xl mx-auto w-full grid grid-cols-7 gap-3 text-center">
                                    {weekDays.map((day) => {
                                        const isChecked = activeHabit?.logs[day.dateStr] !== undefined;
                                        return (
                                            <div key={day.dateStr} class="flex flex-col items-center gap-2">
                                                <span class={`text-[13px] font-medium ${day.isToday ? 'text-indigo-600 font-bold' : 'text-slate-400'}`}>
                                                    {day.name}
                                                </span>
                                                <span class={`text-base font-bold tracking-tight ${day.isToday ? 'text-indigo-600' : 'text-slate-700'}`}>
                                                    {day.num}
                                                </span>
                                                
                                                {/* Check-in Indicator under date */}
                                                <button 
                                                    onClick={(e) => handleToggleCheckIn(activeHabit?.id, day.dateStr, e)}
                                                    class={`w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 relative group active:scale-90 ${
                                                        isChecked 
                                                        ? 'bg-emerald-500 hover:bg-emerald-600 shadow-md shadow-emerald-100 text-white' 
                                                        : day.isToday 
                                                            ? 'border-2 border-indigo-500 bg-white hover:bg-indigo-50/50' 
                                                            : 'striped-placeholder hover:opacity-80'
                                                    }`}
                                                >
                                                    {isChecked ? (
                                                        <svg class="w-5 h-5 animate-jump-in" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                                    ) : (
                                                        day.isToday && <span class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                                                    )}
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {}
                            <div class="flex-1 p-6 max-w-4xl mx-auto w-full space-y-6">
                                
                                {/* Focus Timer Overlay Widget if active */}
                                {focusHabit && (
                                    <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white rounded-3xl p-6 shadow-xl relative overflow-hidden animate-fade-in">
                                        <div class="absolute right-0 bottom-0 opacity-10 pointer-events-none transform translate-y-1/4 translate-x-1/4">
                                            <svg class="w-80 h-80" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"/><path d="M13 7h-2v6h6v-2h-4z"/></svg>
                                        </div>
                                        <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                            <div>
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="px-2 py-0.5 bg-white/20 rounded-full text-xs font-semibold backdrop-blur-sm">专注模式</span>
                                                    <span class="text-indigo-100 text-sm">与 "{focusHabit.name}" 同步</span>
                                                </div>
                                                <h3 class="text-2xl font-bold tracking-tight">专注计时中</h3>
                                            </div>
                                            <div class="flex items-center gap-6">
                                                <span class="text-4xl font-mono font-bold tracking-widest bg-white/15 px-4 py-2 rounded-2xl backdrop-blur-md">
                                                    {formatTime(focusTime)}
                                                </span>
                                                <div class="flex items-center gap-2">
                                                    <button 
                                                        onClick={() => setIsTimerRunning(!isTimerRunning)} 
                                                        class="p-3 bg-white text-indigo-600 rounded-2xl hover:bg-indigo-50 transition active:scale-95 shadow-lg"
                                                    >
                                                        {isTimerRunning ? (
                                                            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                                                        ) : (
                                                            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                                        )}
                                                    </button>
                                                    <button 
                                                        onClick={() => { setFocusHabit(null); setIsTimerRunning(false); }} 
                                                        class="p-3 bg-white/20 hover:bg-white/30 text-white rounded-2xl transition active:scale-95"
                                                    >
                                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Group Sections Rendered Dynamically */}
                                {['上午', '下午', '晚上'].map((groupName) => {
                                    const groupHabits = habits.filter(h => h.group === groupName);
                                    if (groupHabits.length === 0) return null;

                                    return (
                                        <div key={groupName} class="space-y-3">
                                            {/* Section Header */}
                                            <button 
                                                onClick={() => setIsGroupOpen(prev => ({ ...prev, [groupName]: !prev[groupName] }))}
                                                class="flex items-center gap-2 text-slate-500 hover:text-slate-900 transition-colors py-1 text-sm font-semibold tracking-wide uppercase select-none"
                                            >
                                                <svg class={`w-4 h-4 transform transition-transform duration-200 ${isGroupOpen[groupName] ? 'rotate-180' : 'rotate-90'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                                                <span>{groupName}</span>
                                                <span class="text-xs bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded-full font-medium ml-1">

                                            type="text" 
                                            name="name" 
                                            defaultValue={editingHabit ? editingHabit.name : ''}
                                            placeholder="输入习惯名称" 
                                            required
                                            class="flex-1 bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-base font-bold text-slate-800 focus:outline-none focus:border-indigo-500 shadow-sm"
                                        />
                                    </div>

                                    {/* Form Fields layout exactly like image_22b887.png */}
                                    <div class="space-y-3">
                                        
                                        {/* Field: 频率 */}
                                        <div class="flex items-center justify-between gap-4">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0">频率</label>
                                            <select 
                                                name="frequency"
                                                defaultValue={editingHabit ? editingHabit.frequency : '每天'}
                                                class="flex-1 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500 text-right appearance-none cursor-pointer"
                                            >
                                                <option value="每天">每天</option>
                                                <option value="每周">每周</option>
                                                <option value="每月">每月</option>
                                            </select>
                                        </div>

                                        {/* Field: 目标 */}
                                        <div class="flex items-center justify-between gap-4">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0">目标</label>
                                            <select 
                                                name="target"
                                                defaultValue={editingHabit ? editingHabit.target : '当天完成打卡'}
                                                class="flex-1 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500 text-right cursor-pointer"
                                            >
                                                <option value="当天完成打卡">当天完成打卡</option>
                                                <option value="目标时长">设定具体计时目标</option>
                                            </select>
                                        </div>

                                        {/* Field: 开始日期 */}
                                        <div class="flex items-center justify-between gap-4">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0">开始日期</label>
                                            <input 
                                                type="date"
                                                name="startDate"
                                                defaultValue={editingHabit ? editingHabit.startDate : todayStr}
                                                class="flex-1 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 px-4 py-2 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500 text-right cursor-pointer"
                                            />
                                        </div>

                                        {/* Field: 坚持天数 */}
                                        <div class="flex items-center justify-between gap-4">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0 flex items-center gap-1">
                                                坚持天数
                                                <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            </label>
                                            <select 
                                                name="duration"
                                                defaultValue={editingHabit ? editingHabit.duration : '永远'}
                                                class="flex-1 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500 text-right cursor-pointer"
                                            >
                                                <option value="永远">永远</option>
                                                <option value="21天">坚持 21 天 (习惯养成期)</option>
                                                <option value="100天">坚持 100 天 (深度重塑)</option>
                                            </select>
                                        </div>

                                        {/* Field: 所属分组 */}
                                        <div class="flex items-center justify-between gap-4">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0">所属分组</label>
                                            <select 
                                                name="group"
                                                defaultValue={editingHabit ? editingHabit.group : '上午'}
                                                class="flex-1 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500 text-right cursor-pointer"
                                            >
                                                <option value="上午">上午</option>
                                                <option value="下午">下午</option>
                                                <option value="晚上">晚上</option>
                                            </select>
                                        </div>

                                        {/* Field: 提醒 */}
                                        <div class="flex items-center justify-between gap-4 py-1">
                                            <label class="text-[14px] font-bold text-slate-500 flex-shrink-0">提醒</label>
                                            <div class="flex items-center gap-2">
                                                <input 
                                                    type="time" 
                                                    name="reminderTime"
                                                    defaultValue={editingHabit ? editingHabit.reminderTime : '09:00'}
                                                    class="bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500"
                                                />
                                                <button type="button" class="p-2 bg-slate-50 hover:bg-slate-100 text-slate-400 hover:text-slate-600 rounded-xl transition border border-slate-200/60">
                                                    <svg class="w-4 h-4 stroke-[2.5]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                                                </button>
                                            </div>
                                        </div>

                                        {/* Toggle Block: 持续提醒 */}
                                        <div class="flex items-center justify-between py-1">
                                            <span class="text-[14px] font-bold text-slate-500">持续提醒</span>
                                            <label class="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" class="sr-only peer" />
                                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                                            </label>
                                        </div>

                                        <hr class="border-slate-100 my-2" />

                                        {/* Checkbox: 自动弹出打卡日志 */}
                                        <label class="flex items-center gap-2.5 py-1 cursor-pointer group">
                                            <input 
                                                type="checkbox" 
                                                name="autoLog"
                                                defaultChecked={editingHabit ? editingHabit.autoLog : false}
                                                class="w-4.5 h-4.5 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300" 
                                            />
                                            <span class="text-sm font-semibold text-slate-500 group-hover:text-slate-700 transition">自动弹出打卡日志</span>
                                        </label>

                                    </div>

                                    {/* Action Buttons */}
                                    <div class="flex gap-3 pt-4 border-t border-slate-100">
                                        <button 
                                            type="submit" 
                                            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-2xl font-bold transition active:scale-95 shadow-lg shadow-indigo-100"
                                        >
                                            保存
                                        </button>
                                        <button 
                                            type="button" 
                                            onClick={() => { setIsEditModalOpen(false); setEditingHabit(null); }}
                                            class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-3 rounded-2xl font-bold transition active:scale-95"
                                        >
                                            取消
                                        </button>
                                    </div>

                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render React DOM
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
